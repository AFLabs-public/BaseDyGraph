# Data configuration for BaseDyGraph.
# `data:` maps to src/synthetic_generators.py:SyntheticGraphDataConfig and matches
# the data block in notebooks/BaseDyGraph_experiments.ipynb. `splits` and
# `batch_size` set the train/val/test partition and the dataloader.
# These knobs define the task and are fixed; overriding a `data:` field in a sweep
# regenerates the dataset (num_states / num_nodes are read from here).

data:
  num_samples: 3000
  seq_len: 128
  num_nodes: 32
  num_states: 32
  num_regimes: 12
  regime_stickiness: 0.85
  regime_scale: 1.0
  sparsity: 0.75
  self_transition_scale: 0.5
  spatial_scale: 10.0
  shock_prob: 0.01
  shock_scale: 2.0
  seed: 7

splits:
  train: 2500
  val: 500
  test: 0

batch_size: 64
